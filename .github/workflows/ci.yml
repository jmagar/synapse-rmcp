# =============================================================================
# .github/workflows/ci.yml — Continuous Integration
#
# TEMPLATE substitutions required:
#   REPO_NAME   → your GitHub repo name (e.g. "myservice-mcp")
#   BINARY_NAME → your binary name from Cargo.toml [[bin]] (e.g. "myservice")
#
# This workflow runs on every push and PR to main.
# Jobs: fmt, clippy, test (nextest), web, toml, template checks, deny, gitleaks
#
# All jobs must pass before merging. Adjust the matrix rust-version to match
# your Cargo.toml `rust-version` field.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── fmt: cargo fmt --check ──────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust 1.90 with rustfmt
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.90.0
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ── clippy: zero warnings ────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust 1.90 with clippy
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.90.0
          components: clippy

      # Cache Cargo registry and build artifacts between runs.
      # TEMPLATE: Change the cache key prefix from "rmcp-template" to your repo name.
      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ github.repository }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-clippy-

      - name: cargo clippy -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

  # ── test: cargo nextest run --profile ci ─────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust 1.90
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.90.0

      # TEMPLATE: Change cache key prefix from "rmcp-template" to your repo name.
      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ github.repository }}-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ github.repository }}-test-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@95cc2373c3f00275e315c306e56fef1c7a8854c0 # cargo-nextest

      - name: cargo nextest run --profile ci
        run: cargo nextest run --profile ci

  coverage:
    name: Coverage (65% lines)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust 1.90
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.90.0

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@95cc2373c3f00275e315c306e56fef1c7a8854c0 # cargo-llvm-cov
        with:
          tool: cargo-llvm-cov

      - name: Enforce line coverage floor
        run: cargo llvm-cov --locked --workspace --all-features --fail-under-lines 65

  live-integration:
    name: Live JSON-RPC + SSH
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust 1.90
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.90.0

      - name: Configure disposable localhost SSH fixture
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server
          sudo ssh-keygen -A
          ssh-keygen -q -t ed25519 -N '' -f "$RUNNER_TEMP/id_ed25519"
          # A leading `!` in the shadow entry makes OpenSSH reject the account
          # before public-key auth when UsePAM is disabled. `*` keeps password
          # login impossible while allowing the disposable key below.
          sudo useradd --create-home --shell /bin/bash --password '*' synapse-ci
          sudo install -d -m 700 -o synapse-ci -g synapse-ci /home/synapse-ci/.ssh
          sudo install -m 600 -o synapse-ci -g synapse-ci \
            "$RUNNER_TEMP/id_ed25519.pub" /home/synapse-ci/.ssh/authorized_keys
          chmod 600 "$RUNNER_TEMP/id_ed25519"
          cat >"$RUNNER_TEMP/sshd_config" <<EOF
          Port 2222
          ListenAddress 127.0.0.1
          HostKey /etc/ssh/ssh_host_ed25519_key
          AuthorizedKeysFile .ssh/authorized_keys
          PasswordAuthentication no
          PubkeyAuthentication yes
          StrictModes yes
          UsePAM no
          AllowUsers synapse-ci
          EOF
          sudo mkdir -p /run/sshd
          sudo /usr/sbin/sshd -f "$RUNNER_TEMP/sshd_config" -E "$RUNNER_TEMP/sshd.log"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          ssh-keyscan -p 2222 127.0.0.1 >>"$HOME/.ssh/known_hosts" 2>/dev/null
          if ! ssh -o BatchMode=yes -i "$RUNNER_TEMP/id_ed25519" -p 2222 \
            synapse-ci@127.0.0.1 true; then
            sudo cat "$RUNNER_TEMP/sshd.log"
            exit 1
          fi
          printf '%s\n' 'synapse-live-ssh-ok' >/tmp/synapse-ci-fixture

      - name: Exercise SSH pool against the fixture
        env:
          SYNAPSE_TEST_SSH_REQUIRED: "1"
          SYNAPSE_TEST_SSH_HOST: 127.0.0.1
          SYNAPSE_TEST_SSH_PORT: "2222"
          SYNAPSE_TEST_SSH_USER: synapse-ci
          SYNAPSE_TEST_SSH_KEY: ${{ runner.temp }}/id_ed25519
        run: cargo test --locked --test ssh_pool

      - name: Exercise live MCP JSON-RPC through SSH
        shell: bash
        env:
          SYNAPSE_MCP_NO_AUTH: "true"
          SYNAPSE_HOSTS_CONFIG: >-
            [{"name":"ci-ssh","host":"127.0.0.1","protocol":"ssh","sshUser":"synapse-ci","sshKeyPath":"${{ runner.temp }}/id_ed25519","sshPort":2222,"scoutReadRoots":["/tmp"]}]
        run: |
          cargo build --locked
          target/debug/synapse serve mcp >"$RUNNER_TEMP/synapse.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          bash scripts/test-live-jsonrpc.sh

  # ── web: pnpm install, lint, audit, static build ─────────────────────────────
  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        run: npm install -g "$(node -p "require('./package.json').packageManager")"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --prod --audit-level high

      - name: pnpm lint
        run: pnpm lint

      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm test
        run: pnpm test

      - name: pnpm build
        run: pnpm build

  # ── toml: taplo check ─────────────────────────────────────────────────────────
  toml:
    name: TOML Format
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install taplo
        uses: taiki-e/install-action@e03236526ace47fa2e04bebcfc6da471ebd4690c # v2.49.0
        with:
          tool: taplo-cli

      - name: taplo check
        run: taplo check

  # ── template: generated docs, plugin layout, coupled files ───────────────────
  template:
    name: Template Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust 1.90
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.90.0

      - name: Check PATTERNS.md contracts
        run: cargo xtask patterns

      - name: Check test sibling coverage
        run: cargo xtask check-test-siblings

      - name: Check Rust module sizes (NO MONOLITHS)
        run: bash scripts/check-rust-module-size.sh

      - name: Validate plugin layout
        run: bash scripts/validate-plugin-layout.sh

      - name: Check schema docs
        run: python3 scripts/check-schema-docs.py --check

      - name: Check OpenAPI docs
        run: python3 scripts/check-openapi.py --check

      - name: Check identity and operation registry contract
        run: python3 scripts/check-identity-contract.py

      - name: Check scaffold intent contract
        run: python3 scripts/check-scaffold-intent-contract.py

      - name: Run template feature smoke tests
        run: bash scripts/test-template-features.sh

      - name: Check blob sizes
        run: python3 scripts/check-blob-size.py --base origin/main --head HEAD

      - name: Check coupled files
        run: bash scripts/check-coupled-files.sh origin/main HEAD

      - name: ASCII hygiene
        run: bash scripts/run-ascii-check.sh

  # ── deny: dependency advisories, licenses, bans, sources ─────────────────────
  audit:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          arguments: --all-features

      - name: Install cargo-deny for exception guard
        uses: taiki-e/install-action@95cc2373c3f00275e315c306e56fef1c7a8854c0
        with:
          tool: cargo-deny

      - name: Enforce time-bounded yanked exceptions
        run: python3 scripts/check-yanked-exceptions.py

  # ── gitleaks: secret scanning ─────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # full history needed for gitleaks

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm:
    name: npm launcher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
      - name: Test npm launcher
        run: npm test --prefix packages/synapse-rmcp
      - name: Check npm launcher syntax
        run: npm run check --prefix packages/synapse-rmcp
      - name: Dry-run npm package
        run: npm pack --dry-run --json ./packages/synapse-rmcp

  container:
    name: Container smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve production Compose
        env:
          DOCKER_GID: "999"
        run: docker compose -f docker-compose.prod.yml config --quiet
      - name: Build deployable image
        run: docker build -f config/Dockerfile -t synapse2:ci .
      - name: Smoke liveness
        run: |
          docker run -d --rm --name synapse2-ci -p 127.0.0.1:40080:40080 \
            -e SYNAPSE_MCP_HOST=0.0.0.0 \
            -e SYNAPSE_MCP_TOKEN=ci-smoke-token-with-sufficient-length synapse2:ci
          trap 'docker logs synapse2-ci; docker stop synapse2-ci >/dev/null' EXIT
          for _attempt in {1..30}; do
            curl -fsS http://127.0.0.1:40080/health && exit 0
            sleep 1
          done
          exit 1
      - name: Smoke container CLI entrypoint
        run: |
          docker run --rm synapse2:ci flux --help >/dev/null
          docker run --rm synapse2:ci scout --help >/dev/null
